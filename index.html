<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTG販売記録ツール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');
  :root {
    --bg: #0f0f13; --surface: #1a1a22; --surface2: #22222e;
    --border: #2e2e3e; --accent: #6c63ff; --accent2: #ff6584;
    --text: #e8e8f0; --text-dim: #8888aa; --success: #4ade80; --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; min-height: 100vh; padding: 20px 16px 100px; }
  header { text-align: center; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  header h1 { font-family: 'Space Mono', monospace; font-size: 20px; color: var(--accent); letter-spacing: 2px; margin-bottom: 4px; }
  header p { color: var(--text-dim); font-size: 12px; }
  .section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 20px; }
  .section h2 { font-size: 11px; font-family: 'Space Mono', monospace; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 14px; text-transform: uppercase; }
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
  .field label span.req { color: var(--accent2); margin-left: 2px; }
  select, input[type="date"], input[type="number"], input[type="text"], textarea {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: 14px; padding: 10px 12px; width: 100%;
    font-family: 'Noto Sans JP', sans-serif; outline: none; appearance: none; -webkit-appearance: none;
  }
  select:focus, input:focus, textarea:focus { border-color: var(--accent); }
  textarea { min-height: 90px; resize: vertical; line-height: 1.6; }
  .record-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
  .record-card.submitted { border-color: var(--success); opacity: 0.7; }
  .record-card.error { border-color: var(--accent2); }
  .record-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .record-num { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--accent); letter-spacing: 1px; }
  .record-status { font-size: 11px; padding: 3px 8px; border-radius: 4px; display: none; }
  .record-status.ok { background: rgba(74,222,128,0.15); color: var(--success); display: inline-block; }
  .record-status.err { background: rgba(255,101,132,0.15); color: var(--accent2); display: inline-block; }
  .record-status.sending { background: rgba(108,99,255,0.15); color: var(--accent); display: inline-block; }
  .btn-remove { background: none; border: 1px solid #3e2e3e; border-radius: 4px; color: var(--accent2); cursor: pointer; font-size: 12px; padding: 4px 10px; }
  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  .options-grid.single-col { grid-template-columns: 1fr; }
  .options-grid.three-col { grid-template-columns: 1fr 1fr 1fr; }
  .option-btn {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text-dim); cursor: pointer; font-size: 13px; font-family: 'Noto Sans JP', sans-serif;
    padding: 9px 10px; text-align: left; transition: all 0.15s; display: flex; align-items: center; gap: 7px;
  }
  .option-btn.selected { background: rgba(108,99,255,0.15); border-color: var(--accent); color: var(--text); }
  .option-btn.selected .dot { background: var(--accent); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .template-helper { background: var(--surface2); border: 1px dashed var(--border); border-radius: 6px; padding: 12px; margin-bottom: 8px; }
  .template-helper p { font-size: 11px; color: var(--text-dim); margin-bottom: 8px; }
  .template-fields { display: flex; flex-direction: column; gap: 7px; }
  .template-row { display: flex; gap: 7px; align-items: center; }
  .template-row label { font-size: 11px; color: var(--accent); white-space: nowrap; min-width: 80px; margin: 0; }
  .template-row input { padding: 7px 10px; font-size: 13px; }
  .divider { height: 1px; background: var(--border); margin: 14px 0; }
  .product-section { display: none; }
  .product-section.visible { display: block; }
  .other-text-input { display: none; margin-top: 8px; }
  .other-text-input.visible { display: block; }
  .btn-add { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 13px; font-size: 14px; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; width: 100%; margin-bottom: 14px; }
  .btn-add:hover { background: #7c73ff; }
  .records-label { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; }
  .submit-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 12px 16px; }
  .btn-submit-all { width: 100%; background: var(--accent); border: none; border-radius: 8px; color: white; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 700; padding: 15px; }
  .btn-submit-all:hover { background: #7c73ff; }
  .btn-submit-all:disabled { background: #444; cursor: not-allowed; }
  .progress-text { text-align: center; font-size: 12px; color: var(--text-dim); margin-top: 6px; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px 24px; max-width: 320px; width: 90%; text-align: center; }
  .modal h3 { font-size: 18px; margin-bottom: 10px; }
  .modal p { color: var(--text-dim); font-size: 13px; line-height: 1.7; margin-bottom: 20px; }
  .modal-icon { font-size: 40px; margin-bottom: 12px; }
  .btn-modal { background: var(--accent); border: none; border-radius: 8px; color: white; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 700; padding: 12px 28px; }
</style>
</head>
<body>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-icon" id="modal-icon">✅</div>
    <h3 id="modal-title"></h3>
    <p id="modal-body"></p>
    <button class="btn-modal" onclick="document.getElementById('modal').classList.remove('show')">OK</button>
  </div>
</div>

<header>
  <h1>MTG // 販売記録</h1>
  <p>入力後「一括送信」で自動提出</p>
</header>

<!-- 固定情報入力 -->
<div class="section">
  <h2>基本情報</h2>
  <div class="field">
