<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTG販売記録ツール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');
  :root {
    --bg: #0f0f13; --surface: #1a1a22; --surface2: #22222e;
    --border: #2e2e3e; --accent: #6c63ff; --accent2: #ff6584;
    --text: #e8e8f0; --text-dim: #8888aa; --success: #4ade80; --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; min-height: 100vh; padding: 20px 16px 100px; }
  header { text-align: center; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  header h1 { font-family: 'Space Mono', monospace; font-size: 20px; color: var(--accent); letter-spacing: 2px; margin-bottom: 4px; }
  header p { color: var(--text-dim); font-size: 12px; }
  .section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 20px; }
  .section h2 { font-size: 11px; font-family: 'Space Mono', monospace; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 14px; text-transform: uppercase; }
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
  .field label span.req { color: var(--accent2); margin-left: 2px; }
  select, input[type="date"], input[type="number"], input[type="text"], textarea {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: 14px; padding: 10px 12px; width: 100%;
    font-family: 'Noto Sans JP', sans-serif; outline: none; appearance: none; -webkit-appearance: none;
  }
  select:focus, input:focus, textarea:focus { border-color: var(--accent); }
  textarea { min-height: 90px; resize: vertical; line-height: 1.6; }
  .record-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
  .record-card.submitted { border-color: var(--success); opacity: 0.7; }
  .record-card.error { border-color: var(--accent2); }
  .record-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .record-num { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--accent); letter-spacing: 1px; }
  .record-status { font-size: 11px; padding: 3px 8px; border-radius: 4px; display: none; }
  .record-status.ok { background: rgba(74,222,128,0.15); color: var(--success); display: inline-block; }
  .record-status.err { background: rgba(255,101,132,0.15); color: var(--accent2); display: inline-block; }
  .record-status.sending { background: rgba(108,99,255,0.15); color: var(--accent); display: inline-block; }
  .btn-remove { background: none; border: 1px solid #3e2e3e; border-radius: 4px; color: var(--accent2); cursor: pointer; font-size: 12px; padding: 4px 10px; }
  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  .options-grid.single-col { grid-template-columns: 1fr; }
  .options-grid.three-col { grid-template-columns: 1fr 1fr 1fr; }
  .option-btn {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text-dim); cursor: pointer; font-size: 13px; font-family: 'Noto Sans JP', sans-serif;
    padding: 9px 10px; text-align: left; transition: all 0.15s; display: flex; align-items: center; gap: 7px;
  }
  .option-btn.selected { background: rgba(108,99,255,0.15); border-color: var(--accent); color: var(--text); }
  .option-btn.selected .dot { background: var(--accent); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .template-helper { background: var(--surface2); border: 1px dashed var(--border); border-radius: 6px; padding: 12px; margin-bottom: 8px; }
  .template-helper p { font-size: 11px; color: var(--text-dim); margin-bottom: 8px; }
  .template-fields { display: flex; flex-direction: column; gap: 7px; }
  .template-row { display: flex; gap: 7px; align-items: center; }
  .template-row label { font-size: 11px; color: var(--accent); white-space: nowrap; min-width: 80px; margin: 0; }
  .template-row input { padding: 7px 10px; font-size: 13px; }
  .divider { height: 1px; background: var(--border); margin: 14px 0; }
  .product-section { display: none; }
  .product-section.visible { display: block; }
  .other-text-input { display: none; margin-top: 8px; }
  .other-text-input.visible { display: block; }
  .btn-add { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 13px; font-size: 14px; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; width: 100%; margin-bottom: 14px; }
  .btn-add:hover { background: #7c73ff; }
  .records-label { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; }
  .submit-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 12px 16px; }
  .btn-submit-all { width: 100%; background: var(--accent); border: none; border-radius: 8px; color: white; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 700; padding: 15px; }
  .btn-submit-all:hover { background: #7c73ff; }
  .btn-submit-all:disabled { background: #444; cursor: not-allowed; }
  .progress-text { text-align: center; font-size: 12px; color: var(--text-dim); margin-top: 6px; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px 24px; max-width: 320px; width: 90%; text-align: center; }
  .modal h3 { font-size: 18px; margin-bottom: 10px; }
  .modal p { color: var(--text-dim); font-size: 13px; line-height: 1.7; margin-bottom: 20px; }
  .modal-icon { font-size: 40px; margin-bottom: 12px; }
  .btn-modal { background: var(--accent); border: none; border-radius: 8px; color: white; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 700; padding: 12px 28px; }
</style>
</head>
<body>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-icon" id="modal-icon">✅</div>
    <h3 id="modal-title"></h3>
    <p id="modal-body"></p>
    <button class="btn-modal" onclick="document.getElementById('modal').classList.remove('show')">OK</button>
  </div>
</div>

<header>
  <h1>MTG // 販売記録</h1>
  <p>入力後「一括送信」で自動提出</p>
</header>

<!-- 固定情報入力 -->
<div class="section">
  <h2>基本情報</h2>
  <div class="field">
    <label>氏名 <span class="req">*</span></label>
    <input type="text" id="user-name" placeholder="姓名（スペースなし）">
  </div>
  <div class="field">
    <label>法人名 <span class="req">*</span></label>
    <select id="hojin-select" onchange="updateStores()">
      <option value="">選択してください</option>
      <option>ヨドバシカメラ</option>
      <option>ビックカメラ</option>
      <option>コジマ</option>
      <option>ヤマダデンキ</option>
      <option>エディオン</option>
      <option>ケーズデンキ</option>
      <option>ハンズ</option>
      <option>アルペン</option>
    </select>
  </div>
  <div class="field">
    <label>入店店舗名 <span class="req">*</span></label>
    <select id="store-select">
      <option value="">先に法人名を選択してください</option>
    </select>
  </div>
  <div class="field">
    <label>入店日 <span class="req">*</span></label>
    <input type="date" id="nyuten-date">
  </div>
</div>

<div class="records-label">販売記録</div>
<div id="records-container"></div>
<button class="btn-add" onclick="addRecord()">＋ 販売記録を追加</button>
<div style="height:90px"></div>

<div class="submit-bar">
  <button class="btn-submit-all" id="btn-submit" onclick="submitAll()">📤 全件をGoogle Formに送信</button>
  <div class="progress-text" id="progress-text"></div>
</div>

<script>
const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSeKviIwNheXppyVbhJF6C02XN2vASfUpucwWK5mCmX1vAKAgQ/formResponse";

function updateStores() {
  const hojin = document.getElementById('hojin-select').value;
  const sel = document.getElementById('store-select');
  sel.innerHTML = '';
  if (!hojin || !STORES[hojin]) {
    sel.innerHTML = '<option value="">先に法人名を選択してください</option>';
    return;
  }
  sel.innerHTML = '<option value="">店舗を選択してください</option>' +
    STORES[hojin].map(s => `<option value="${s}">${s}</option>`).join('');
}

  'SIXPAD Knee Fit (Sサイズ)','SIXPAD Knee Fit (Mサイズ)','SIXPAD Knee Fit (Lサイズ)','Knee Fit Controller',
  'SIXPAD Cushion Fit','SIXPAD Cushion Fit 専用コントローラー',
  'SIXPAD Powersuit Top MEN S','SIXPAD Powersuit Top MEN M','SIXPAD Powersuit Top MEN L','SIXPAD Powersuit Top MEN LL',
  'SIXPAD Powersuit Top WOMEN S','SIXPAD Powersuit Top WOMEN M','SIXPAD Powersuit Top WOMEN L','SIXPAD Powersuit Top WOMEN LL',
  'SIXPAD Powersuit Bottom MEN S','SIXPAD Powersuit Bottom MEN M','SIXPAD Powersuit Bottom MEN L','SIXPAD Powersuit Bottom MEN LL',
  'SIXPAD PowersuitBottom WOMEN S','SIXPAD PowersuitBottom WOMEN M','SIXPAD PowersuitBottom WOMEN L','SIXPAD PowersuitBottom WOMEN LL',

let recordCount = 0;
const records = {};

document.getElementById('nyuten-date').value = new Date().toISOString().split('T')[0];

function mkSelect(id, field, products) {

    <option value="">選択してください</option>

    <div class="product-section" id="sec-sixpad-rw-${id}">
      <div class="field"><label>製品名（SIXPADリカバリーウェア） <span class="req">*</span></label>${mkSelect(id,'sixpad-rw',RECOVERY_WEAR_PRODUCTS)}</div>
      <div class="field"><label>販売数</label><input type="number" min="1" value="1" style="max-width:100px" onchange="records[${id}].qty=this.value"></div>
    </div>

    <div class="product-section" id="sec-sonota-${id}">
      <div class="field"><label>製品名（その他） <span class="req">*</span></label>${mkSelect(id,'sonota',SONOTA_PRODUCTS)}</div>
      <div class="field"><label>販売台数</label><input type="number" min="1" value="1" style="max-width:100px" onchange="records[${id}].qty=this.value"></div>
    </div>

    <div class="product-section" id="sec-rw-${id}">
      <div class="divider"></div>
      <div class="field"><label>製品名（リカバリーウェア） <span class="req">*</span></label>${mkSelect(id,'rw',RECOVERY_WEAR_PRODUCTS)}</div>
      <div class="field"><label>販売数</label><input type="number" min="1" value="1" style="max-width:100px" onchange="records[${id}].qty=this.value"></div>
    </div>

    <div class="product-section" id="sec-style-${id}">
      <div class="divider"></div>
      <div class="field"><label>製品名（Style） <span class="req">*</span></label>${mkSelect(id,'style',STYLE_PRODUCTS)}</div>
      <div class="field"><label>販売台数</label><input type="number" min="1" value="1" style="max-width:100px" onchange="records[${id}].qty=this.value"></div>
    </div>

    <div class="product-section" id="sec-buyer-${id}">
      <div class="divider"></div>
      <div class="field"><label>購入者属性 <span class="req">*</span></label>
        <div class="options-grid" id="buyer-${id}">
          ${BUYER_OPTIONS.map(o=>`<button class="option-btn" data-val="${o}" onclick="selectOpt(${id},'buyer','buyer-${id}','${o}')"><span class="dot"></span>${o}</button>`).join('')}
        </div>
        <div class="other-text-input" id="buyer-other-wrap-${id}">
          <input type="text" placeholder="その他の内容を入力..." oninput="records[${id}].buyerOther=this.value">
        </div>
      </div>
      <div class="field"><label>インバウンド購入</label>
        <button class="option-btn" id="inbound-${id}" onclick="toggleInbound(${id})"><span class="dot" id="inbound-dot-${id}"></span>インバウンド購入（海外旅行者）</button>
      </div>
      <div class="field"><label>性別 <span class="req">*</span></label>
        <div class="options-grid" id="gender-${id}">
          ${GENDER_OPTIONS.map(o=>`<button class="option-btn" data-val="${o}" onclick="selectOpt(${id},'gender','gender-${id}','${o}')"><span class="dot"></span>${o}</button>`).join('')}
        </div>
      </div>
      <div class="field"><label>年代 <span class="req">*</span></label>
        <select onchange="records[${id}].age=this.value">
          <option value="">選択</option>
          ${AGE_OPTIONS.map(a=>`<option value="${a}">${a}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>購入ニーズ（複数選択可） <span class="req">*</span></label>
        <div class="options-grid three-col" id="needs-${id}">
          ${NEEDS_OPTIONS.map(o=>`<button class="option-btn" data-val="${o}" onclick="toggleNeed(${id},'${o}',this)"><span class="dot"></span>${o}</button>`).join('')}
        </div>
        <div class="other-text-input" id="needs-other-wrap-${id}">
          <input type="text" placeholder="その他の内容を入力..." oninput="records[${id}].needsOther=this.value">
        </div>
      </div>
      <div class="divider"></div>
      <div class="field"><label>販売経緯・決め手 <span class="req">*</span></label>
        <div class="template-helper">
          <p>▸ テンプレ入力（自動で文章生成）</p>
          <div class="template-fields">
            <div class="template-row"><label>どこで</label><input type="text" id="t1-${id}" placeholder="例：体重計売場" oninput="genKeii(${id})"></div>
            <div class="template-row"><label>どんなお客様</label><input type="text" id="t2-${id}" placeholder="例：30代女性" oninput="genKeii(${id})"></div>
            <div class="template-row"><label>声かけ方法</label><input type="text" id="t3-${id}" placeholder="例：EMS体験を提案" oninput="genKeii(${id})"></div>
            <div class="template-row"><label>興味ポイント</label><input type="text" id="t4-${id}" placeholder="例：ジェルシート不要" oninput="genKeii(${id})"></div>
            <div class="template-row"><label>決め手</label><input type="text" id="t5-${id}" placeholder="例：体験後に効果実感" oninput="genKeii(${id})"></div>
          </div>
        </div>
        <textarea id="keii-${id}" placeholder="または直接入力..." oninput="records[${id}].keii=this.value"></textarea>
      </div>
    </div>
  `;
  document.getElementById('records-container').appendChild(card);
}

function selectBrand(id, brand) {
  records[id].brand = brand; records[id].category = ''; records[id].product = '';
  document.querySelectorAll(`#brand-${id} .option-btn`).forEach(b=>b.classList.toggle('selected',b.dataset.val===brand));
  ['sixpad-cat','ems','training','sixpad-rw','sonota','rw','style','buyer'].forEach(s=>{
    const el=document.getElementById(`sec-${s}-${id}`); if(el) el.classList.remove('visible');
  });
  if(brand==='SIXPAD'){document.getElementById(`sec-sixpad-cat-${id}`).classList.add('visible');document.getElementById(`sec-buyer-${id}`).classList.add('visible');}
  else if(brand==='リカバリーウェア'){document.getElementById(`sec-rw-${id}`).classList.add('visible');document.getElementById(`sec-buyer-${id}`).classList.add('visible');}
  else if(brand==='Style'){document.getElementById(`sec-style-${id}`).classList.add('visible');document.getElementById(`sec-buyer-${id}`).classList.add('visible');}
}

function selectCategory(id, cat) {
  records[id].category=cat; records[id].product='';
  document.querySelectorAll(`#cat-${id} .option-btn`).forEach(b=>b.classList.toggle('selected',b.dataset.val===cat));
  ['ems','training','sixpad-rw','sonota'].forEach(s=>{const el=document.getElementById(`sec-${s}-${id}`);if(el)el.classList.remove('visible');});
  if(cat==='EMS製品') document.getElementById(`sec-ems-${id}`).classList.add('visible');
  else if(cat==='トレーニング製品') document.getElementById(`sec-training-${id}`).classList.add('visible');
  else if(cat==='リカバリーウェア') document.getElementById(`sec-sixpad-rw-${id}`).classList.add('visible');
  else if(cat==='その他') document.getElementById(`sec-sonota-${id}`).classList.add('visible');
}

function selectOpt(id, field, gridId, val) {
  records[id][field]=val;
  document.querySelectorAll(`#${gridId} .option-btn`).forEach(b=>b.classList.toggle('selected',b.dataset.val===val));
  if(field==='buyer'){const w=document.getElementById(`buyer-other-wrap-${id}`);if(w)w.classList.toggle('visible',val==='その他');}
}

function toggleInbound(id) {
  records[id].inbound=!records[id].inbound;
  document.getElementById(`inbound-${id}`).classList.toggle('selected',records[id].inbound);
  document.getElementById(`inbound-dot-${id}`).style.background=records[id].inbound?'var(--accent)':'var(--border)';
}

function toggleNeed(id, val, btn) {
  const arr=records[id].needs; const idx=arr.indexOf(val);
  if(idx>=0){arr.splice(idx,1);btn.classList.remove('selected');btn.querySelector('.dot').style.background='var(--border)';}
  else{arr.push(val);btn.classList.add('selected');btn.querySelector('.dot').style.background='var(--accent)';}
  const w=document.getElementById(`needs-other-wrap-${id}`);if(w)w.classList.toggle('visible',arr.includes('その他'));
}

function genKeii(id) {
  const v=n=>document.getElementById(`t${n}-${id}`).value;
  const parts=[];
  if(v(1))parts.push(`【どこで】${v(1)}で`);
  if(v(2))parts.push(`【どんなお客様に】${v(2)}のお客様に`);
  if(v(3))parts.push(`【どのように声掛け】${v(3)}`);
  if(v(4))parts.push(`【興味を引けたポイント】${v(4)}`);
  if(v(5))parts.push(`【決め手】${v(5)}`);
  const text=parts.join('\n');
  document.getElementById(`keii-${id}`).value=text;
  records[id].keii=text;
}

function removeRecord(id) { document.getElementById(`card-${id}`).remove(); delete records[id]; }

function buildFormData(record) {
  const date=document.getElementById('nyuten-date').value;
  const [year,month,day]=date.split('-');
  const name=document.getElementById('user-name').value;
  const hojin=document.getElementById('hojin-select').value;
  const store=document.getElementById('store-select').value;
  const params=new URLSearchParams();
  params.append('entry.1414696091_year',year);
  params.append('entry.1414696091_month',month);
  params.append('entry.1414696091_day',day);
  params.append('entry.957745399',name);
  params.append('entry.843667677',hojin);
  params.append('entry.418509925',store);
  params.append('entry.927703194',record.brand);
  if(record.brand==='SIXPAD'){
    params.append('entry.1269197420',record.category);
    if(record.category==='EMS製品'){params.append('entry.598053843',record.product);params.append('entry.1747555650',record.qty);params.append('entry.1683730406',record.demo);params.append('entry.2049785349',record.set);}
    else if(record.category==='トレーニング製品'){params.append('entry.1376856092',record.product);params.append('entry.1987663396',record.qty);}
    else if(record.category==='リカバリーウェア'){params.append('entry.340451145',record.product);params.append('entry.1209881760',record.qty);}
    else if(record.category==='その他'){params.append('entry.563419043',record.product);params.append('entry.576412682',record.qty);}
  } else if(record.brand==='リカバリーウェア'){params.append('entry.340451145',record.product);params.append('entry.1209881760',record.qty);}
  else if(record.brand==='Style'){params.append('entry.563419043',record.product);params.append('entry.576412682',record.qty);}
  if(record.buyer==='その他'&&record.buyerOther){params.append('entry.1550026628',record.buyerOther);}
  else{params.append('entry.1550026628',record.buyer);}
  params.append('entry.960071082',record.gender);
  params.append('entry.1343540112',record.age);
  if(record.inbound)params.append('entry.69837037','インバウンド購入');
  record.needs.forEach(n=>{
    if(n==='その他'&&record.needsOther)params.append('entry.85210242',record.needsOther);
    else params.append('entry.85210242',n);
  });
  params.append('entry.1620632565',record.keii);
  return params;
}

async function submitAll() {
  const name=document.getElementById('user-name').value.trim();
  const hojin=document.getElementById('hojin-select').value;
  const store=document.getElementById('store-select').value;
  if(!name){showModal('⚠️','氏名を入力してください','ページ上部の基本情報に氏名を入力してください。');return;}
  if(!hojin||!store){showModal('⚠️','法人名・店舗を選択してください','ページ上部の基本情報を確認してください。');return;}
  const ids=Object.keys(records);
  if(ids.length===0){showModal('⚠️','記録がありません','「＋追加」ボタンで販売記録を追加してください。');return;}
  const btn=document.getElementById('btn-submit');
  const prog=document.getElementById('progress-text');
  btn.disabled=true;
  let ok=0;
  for(let i=0;i<ids.length;i++){
    const id=ids[i];
    const statusEl=document.getElementById(`status-${id}`);
    statusEl.textContent='送信中...';statusEl.className='record-status sending';
    prog.textContent=`送信中 ${i+1} / ${ids.length} 件...`;
    try{
      await fetch(FORM_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:buildFormData(records[id]).toString()});
      ok++;statusEl.textContent='✓ 完了';statusEl.className='record-status ok';
      document.getElementById(`card-${id}`).classList.add('submitted');
    }catch(e){statusEl.textContent='✗ エラー';statusEl.className='record-status err';document.getElementById(`card-${id}`).classList.add('error');}
    if(i<ids.length-1)await new Promise(r=>setTimeout(r,1500));
  }
  btn.disabled=false;prog.textContent='';
  if(ok===ids.length)showModal('✅',`${ok}件 送信完了`,`全${ok}件をGoogle Formに送信しました。`);
  else showModal('⚠️',`${ok}/${ids.length}件 完了`,`${ids.length-ok}件でエラーが発生しました。`);
}

function showModal(icon,title,body){
  document.getElementById('modal-icon').textContent=icon;
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').textContent=body;
  document.getElementById('modal').classList.add('show');
}

addRecord();
</script>
